<mat-card class="controls-card">
  <mat-card-header>
    <mat-icon mat-card-avatar>tune</mat-icon>
    <mat-card-title>Prediction Weights</mat-card-title>
    <mat-card-subtitle>Adjust scoring formula</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    @for (slider of sliders; track slider.key) {
      <div class="slider-row">
        <div class="slider-label">
          <mat-icon class="slider-icon">{{ slider.icon }}</mat-icon>
          <span>{{ slider.label }}</span>
        </div>
        <div class="slider-track">
          <mat-slider min="0" max="100" step="5" discrete>
            <input matSliderThumb [value]="pct(slider.key)" (valueChange)="set(slider.key, $event)">
          </mat-slider>
          <span class="slider-pct">{{ pct(slider.key) }}%</span>
        </div>
      </div>
    }
  </mat-card-content>
  <mat-card-actions>
    <button mat-stroked-button (click)="reset()">
      <mat-icon>restart_alt</mat-icon> Reset Defaults
    </button>
  </mat-card-actions>
</mat-card>
